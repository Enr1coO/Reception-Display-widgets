<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Radar - Windy</title>
<style>
  body {
    margin: 0;
    padding: 20px;
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    font-size: 20px;
    color: #333;
    margin-bottom: 16px;
  }
  .map-wrapper {
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    border-radius: 6px;
    overflow: hidden;
  }
</style>
</head>
<body>
  <h1>Weather Radar</h1>
  <div class="map-wrapper">
    <iframe width="650" height="400" src="https://embed.windy.com/embed.html?type=map&location=coordinates&metricRain=mm&metricTemp=°C&metricWind=km/h&zoom=10&overlay=radar&product=radar&level=surface&lat=51.93&lon=4.373&detailLat=51.952&detailLon=4.208&detail=true&message=true" frameborder="0"></iframe>
  </div>
</body>
</html>
