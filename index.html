<title>Weer - Amsterdam</title>
<style>
  html, body {

  }

  #page {
    display: flex;

  /* Dunne balk: natuurlijke hoogte, volle breedte, geen aanpassing nodig */

    flex: 0 0 auto;
    width: 100%;
  }

  /* Onderste blok: neemt alle resterende ruimte, widget wordt gecentreerd
     en daarna vergroot via 'zoom' */
  #bottom-area {
    flex: 1 1 auto;
    width: 100%;
    min-height: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>

<body>

      <script async src="https://app3.weatherwidget.org/js/?id=ww_75fd5e63dfafe"></script>
    </div>
  </div>

  <script>
    function zoomWidget() {
      var widget = document.getElementById('ww_75fd5e63dfafe');
      var bottomArea = document.getElementById('bottom-area');

      var w = widget.offsetWidth;
      var h = widget.offsetHeight;

      if (w === 0 || h === 0) {
        setTimeout(zoomWidget, 200);
        return;
      }

      var availW = bottomArea.clientWidth;
      var availH = bottomArea.clientHeight;
      var factor = Math.min(availW / w, availH / h);

      widget.style.zoom = factor;
    }

    window.addEventListener('load', function () {
      setTimeout(zoomWidget, 800);
    });
    window.addEventListener('resize', function () {
      zoomWidget();
    });
  </script>
